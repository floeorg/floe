name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust (fmt · test · clippy · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-profile

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      # fmt first — fail fast on trivial issues.
      - name: Format check
        run: cargo fmt -- --check

      # Test before clippy: nextest does the full codegen + link, then
      # clippy reuses those artifacts instead of recompiling workspace
      # crates from metadata.
      - name: Tests
        run: cargo nextest run --cargo-profile ci

      - name: Clippy
        run: cargo clippy --profile ci -- -D warnings

      - name: Build
        run: cargo build --profile ci

      - name: Check Floe code samples in docs
        # User-facing docs + llms.txt (LLMs generate Floe code from these — they
        # MUST parse). docs/design.md is excluded; it's an internal compiler
        # spec with intentional pseudo-code and mixed TS/Floe snippets.
        run: cargo run --profile ci -p floe-doc-check -- docs/site/ docs/llms.txt README.md

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: floe-binary
          path: target/ci/floe
          retention-days: 1

  integration:
    name: Integration tests (floe check & build)
    needs: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: floe-binary

      - name: Make binary executable
        run: chmod +x floe

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install example dependencies
        run: pnpm install --frozen-lockfile

      - name: Floe format check
        run: |
          ./floe fmt --check examples/todo-app/src/
          ./floe fmt --check examples/store/src/
          ./floe fmt --check examples/hono-api/src/

      - name: Floe check examples
        run: |
          ./floe check examples/todo-app/src/
          ./floe check examples/store/src/
          ./floe check examples/hono-api/src/

      - name: Floe build examples
        run: |
          ./floe build examples/todo-app/src/
          ./floe build examples/store/src/
          ./floe build examples/hono-api/src/

      - name: TypeScript type-check examples
        run: |
          npx tsc --noEmit -p examples/store/tsconfig.json
          npx tsc --noEmit -p examples/todo-app/tsconfig.json

  lsp:
    name: LSP integration tests
    needs: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: floe-binary

      - name: Make binary executable
        run: chmod +x floe

      - name: Install pytest
        run: pip install pytest

      - name: LSP integration tests
        run: python3 -m pytest tests/lsp/ --floe-bin=./floe -v --tb=short

  tree-sitter:
    name: Tree-sitter grammar (generate + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install tree-sitter-cli
        run: cargo install tree-sitter-cli --locked --version 0.26.8

      - name: Regenerate parser
        working-directory: editors/tree-sitter-floe
        run: tree-sitter generate

      - name: Fail if grammar.js drifted from committed artifacts
        working-directory: editors/tree-sitter-floe
        run: |
          if ! git diff --exit-code src/; then
            echo "::error::grammar.js has drifted from committed src/ artifacts."
            echo "::error::Run 'pnpm --filter tree-sitter-floe regen' and commit src/."
            exit 1
          fi

      - name: Run corpus tests
        working-directory: editors/tree-sitter-floe
        run: tree-sitter test

  install-script:
    name: Install script smoke test (${{ matrix.os }})
    # install.sh fetches the latest GitHub release. Release-please PRs run
    # *before* any release exists for the new version, so the smoke test
    # would 404 on `releases/latest` when there are no releases at all (or
    # pass against an outdated tarball that doesn't match the PR's version).
    # Skip on release-please PRs; the post-merge push-to-main run covers
    # the real validation once the release exists.
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: shellcheck
        if: matrix.os == 'ubuntu-latest'
        run: shellcheck -s sh install.sh

      - name: Run install.sh against the latest release
        # The script pulls from the GitHub Release, not this commit — we
        # just verify the OS/arch detection + tarball path still resolve
        # and the binary runs. GITHUB_TOKEN lifts the API rate limit so
        # the shared-NAT macOS runner doesn't 403 on `releases/latest`.
        env:
          INSTALL_DIR: ${{ runner.temp }}/floe-install
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sh install.sh
          "$INSTALL_DIR/floe" --version

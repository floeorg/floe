name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust (fmt · test · clippy · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-profile

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      # fmt first — fail fast on trivial issues.
      - name: Format check
        run: cargo fmt -- --check

      # Test before clippy: nextest does the full codegen + link, then
      # clippy reuses those artifacts instead of recompiling workspace
      # crates from metadata.
      - name: Tests
        run: cargo nextest run --cargo-profile ci

      - name: Clippy
        run: cargo clippy --profile ci -- -D warnings

      - name: Build
        run: cargo build --profile ci

      - name: Check Floe code samples in docs
        # User-facing docs + llms.txt (LLMs generate Floe code from these — they
        # MUST parse). docs/design.md is excluded; it's an internal compiler
        # spec with intentional pseudo-code and mixed TS/Floe snippets.
        run: cargo run --profile ci -p floe-doc-check -- docs/site/ docs/llms.txt README.md

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: floe-binary
          path: target/ci/floe
          retention-days: 1

  integration:
    name: Integration tests (floe check & build)
    needs: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: floe-binary

      - name: Make binary executable
        run: chmod +x floe

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install example dependencies
        run: pnpm install --frozen-lockfile

      - name: Floe format check
        run: |
          ./floe fmt --check examples/todo-app/src/
          ./floe fmt --check examples/store/src/
          ./floe fmt --check examples/hono-api/src/

      - name: Floe check examples
        run: |
          ./floe check examples/todo-app/src/
          ./floe check examples/store/src/
          ./floe check examples/hono-api/src/

      - name: Floe build examples
        run: |
          ./floe build examples/todo-app/src/
          ./floe build examples/store/src/
          ./floe build examples/hono-api/src/

      - name: TypeScript type-check examples
        run: |
          npx tsc --noEmit -p examples/store/tsconfig.json
          npx tsc --noEmit -p examples/todo-app/tsconfig.json

  lsp:
    name: LSP integration tests
    needs: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: floe-binary

      - name: Make binary executable
        run: chmod +x floe

      - name: Install pytest
        run: pip install pytest

      - name: LSP integration tests
        run: python3 -m pytest tests/lsp/ --floe-bin=./floe -v --tb=short

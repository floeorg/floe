name: Release

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../floe-${{ matrix.target }}.tar.gz floe
        shell: bash

      - name: Package (windows)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../floe-${{ matrix.target }}.zip floe.exe
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: floe-${{ matrix.target }}
          path: floe-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name }}

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload assets and promote prerelease to latest
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag_name }}
          files: artifacts/*
          prerelease: false
          make_latest: "true"

  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    # NPM_TOKEN is a granular token scoped to @floeorg with read+write.
    # `npm publish --provenance` uses GitHub's OIDC for publish auth (the
    # token isn't strictly required for that step), but `npm dist-tag add`
    # falls back to NODE_AUTH_TOKEN and needs a token with write scope.
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build and publish core package
        working-directory: integrations/core
        run: |
          pnpm build
          # Prereleases require an explicit --tag. Publish under `alpha`,
          # then repoint `latest` at the new version so `npm install @floeorg/X`
          # picks up the alpha instead of the deprecated 0.7.0. `dist-tag add`
          # uses NODE_AUTH_TOKEN (set at the job level), which is scoped for
          # @floeorg read+write.
          if [[ "${{ inputs.tag_name }}" == *-* ]]; then
            PKG=$(node -p "require('./package.json').name")
            VER=$(node -p "require('./package.json').version")
            npx npm@latest publish --access public --provenance --tag alpha
            npx npm@latest dist-tag add "$PKG@$VER" latest
          else
            npx npm@latest publish --access public --provenance
          fi

      - name: Build and publish register package
        working-directory: integrations/register
        run: |
          pnpm build
          # Prereleases require an explicit --tag. Publish under `alpha`,
          # then repoint `latest` at the new version so `npm install @floeorg/X`
          # picks up the alpha instead of the deprecated 0.7.0. `dist-tag add`
          # uses NODE_AUTH_TOKEN (set at the job level), which is scoped for
          # @floeorg read+write.
          if [[ "${{ inputs.tag_name }}" == *-* ]]; then
            PKG=$(node -p "require('./package.json').name")
            VER=$(node -p "require('./package.json').version")
            npx npm@latest publish --access public --provenance --tag alpha
            npx npm@latest dist-tag add "$PKG@$VER" latest
          else
            npx npm@latest publish --access public --provenance
          fi

      - name: Build and publish Vite plugin
        working-directory: integrations/vite-plugin-floe
        run: |
          pnpm build
          # Prereleases require an explicit --tag. Publish under `alpha`,
          # then repoint `latest` at the new version so `npm install @floeorg/X`
          # picks up the alpha instead of the deprecated 0.7.0. `dist-tag add`
          # uses NODE_AUTH_TOKEN (set at the job level), which is scoped for
          # @floeorg read+write.
          if [[ "${{ inputs.tag_name }}" == *-* ]]; then
            PKG=$(node -p "require('./package.json').name")
            VER=$(node -p "require('./package.json').version")
            npx npm@latest publish --access public --provenance --tag alpha
            npx npm@latest dist-tag add "$PKG@$VER" latest
          else
            npx npm@latest publish --access public --provenance
          fi

      - name: Build and publish Hono shim
        working-directory: integrations/hono
        run: |
          pnpm build
          # Prereleases require an explicit --tag. Publish under `alpha`,
          # then repoint `latest` at the new version so `npm install @floeorg/X`
          # picks up the alpha instead of the deprecated 0.7.0. `dist-tag add`
          # uses NODE_AUTH_TOKEN (set at the job level), which is scoped for
          # @floeorg read+write.
          if [[ "${{ inputs.tag_name }}" == *-* ]]; then
            PKG=$(node -p "require('./package.json').name")
            VER=$(node -p "require('./package.json').version")
            npx npm@latest publish --access public --provenance --tag alpha
            npx npm@latest dist-tag add "$PKG@$VER" latest
          else
            npx npm@latest publish --access public --provenance
          fi

      - name: Build and publish esbuild plugin
        working-directory: integrations/esbuild-plugin
        run: |
          pnpm build
          # Prereleases require an explicit --tag. Publish under `alpha`,
          # then repoint `latest` at the new version so `npm install @floeorg/X`
          # picks up the alpha instead of the deprecated 0.7.0. `dist-tag add`
          # uses NODE_AUTH_TOKEN (set at the job level), which is scoped for
          # @floeorg read+write.
          if [[ "${{ inputs.tag_name }}" == *-* ]]; then
            PKG=$(node -p "require('./package.json').name")
            VER=$(node -p "require('./package.json').version")
            npx npm@latest publish --access public --provenance --tag alpha
            npx npm@latest dist-tag add "$PKG@$VER" latest
          else
            npx npm@latest publish --access public --provenance
          fi

  publish-extension:
    name: Publish VS Code Extension
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm install

      - name: Build extension
        working-directory: editors/vscode
        run: npm run compile

      - name: Install publishing tools
        run: npm install -g ovsx @vscode/vsce

      - name: Publish to Open VSX
        working-directory: editors/vscode
        run: ovsx publish -p ${{ secrets.OVSX_TOKEN }}

      # VS Code Marketplace does not accept semver prerelease suffixes like
      # `-alpha.1`; it uses Microsoft's own integer-only pre-release model
      # (odd-even minor convention + `--pre-release` flag). Until Floe hits
      # a stable release, alpha extensions are available only on Open VSX
      # and via manual .vsix download from the GitHub Release.
      - name: Publish to VS Code Marketplace
        if: ${{ !contains(inputs.tag_name, '-') }}
        working-directory: editors/vscode
        run: vsce publish -p ${{ secrets.VSCE_PAT }}

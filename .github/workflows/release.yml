name: Release

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../floe-${{ matrix.target }}.tar.gz floe
        shell: bash

      - name: Package (windows)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../floe-${{ matrix.target }}.zip floe.exe
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: floe-${{ matrix.target }}
          path: floe-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name }}

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload assets and promote prerelease to latest
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag_name }}
          files: artifacts/*
          prerelease: false
          make_latest: "true"

  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build and publish core package
        working-directory: integrations/core
        run: |
          pnpm build
          # Prereleases (e.g. 0.1.0-alpha.1) require an explicit --tag. We
          # publish under the `alpha` dist-tag AND point `latest` at it so
          # that `npm install @floeorg/X` picks up the alpha (the old 0.x
          # versions are deprecated but still occupy `latest` otherwise).
          if [[ "${{ inputs.tag_name }}" == *-* ]]; then
            PKG=$(node -p "require('./package.json').name")
            VER=$(node -p "require('./package.json').version")
            npx npm@latest publish --access public --provenance --tag alpha
            npx npm@latest dist-tag add "$PKG@$VER" latest
          else
            npx npm@latest publish --access public --provenance
          fi

      - name: Build and publish register package
        working-directory: integrations/register
        run: |
          pnpm build
          # Prereleases (e.g. 0.1.0-alpha.1) require an explicit --tag. We
          # publish under the `alpha` dist-tag AND point `latest` at it so
          # that `npm install @floeorg/X` picks up the alpha (the old 0.x
          # versions are deprecated but still occupy `latest` otherwise).
          if [[ "${{ inputs.tag_name }}" == *-* ]]; then
            PKG=$(node -p "require('./package.json').name")
            VER=$(node -p "require('./package.json').version")
            npx npm@latest publish --access public --provenance --tag alpha
            npx npm@latest dist-tag add "$PKG@$VER" latest
          else
            npx npm@latest publish --access public --provenance
          fi

      - name: Build and publish Vite plugin
        working-directory: integrations/vite-plugin-floe
        run: |
          pnpm build
          # Prereleases (e.g. 0.1.0-alpha.1) require an explicit --tag. We
          # publish under the `alpha` dist-tag AND point `latest` at it so
          # that `npm install @floeorg/X` picks up the alpha (the old 0.x
          # versions are deprecated but still occupy `latest` otherwise).
          if [[ "${{ inputs.tag_name }}" == *-* ]]; then
            PKG=$(node -p "require('./package.json').name")
            VER=$(node -p "require('./package.json').version")
            npx npm@latest publish --access public --provenance --tag alpha
            npx npm@latest dist-tag add "$PKG@$VER" latest
          else
            npx npm@latest publish --access public --provenance
          fi

      - name: Build and publish Hono shim
        working-directory: integrations/hono
        run: |
          pnpm build
          # Prereleases (e.g. 0.1.0-alpha.1) require an explicit --tag. We
          # publish under the `alpha` dist-tag AND point `latest` at it so
          # that `npm install @floeorg/X` picks up the alpha (the old 0.x
          # versions are deprecated but still occupy `latest` otherwise).
          if [[ "${{ inputs.tag_name }}" == *-* ]]; then
            PKG=$(node -p "require('./package.json').name")
            VER=$(node -p "require('./package.json').version")
            npx npm@latest publish --access public --provenance --tag alpha
            npx npm@latest dist-tag add "$PKG@$VER" latest
          else
            npx npm@latest publish --access public --provenance
          fi

      - name: Build and publish esbuild plugin
        working-directory: integrations/esbuild-plugin
        run: |
          pnpm build
          # Prereleases (e.g. 0.1.0-alpha.1) require an explicit --tag. We
          # publish under the `alpha` dist-tag AND point `latest` at it so
          # that `npm install @floeorg/X` picks up the alpha (the old 0.x
          # versions are deprecated but still occupy `latest` otherwise).
          if [[ "${{ inputs.tag_name }}" == *-* ]]; then
            PKG=$(node -p "require('./package.json').name")
            VER=$(node -p "require('./package.json').version")
            npx npm@latest publish --access public --provenance --tag alpha
            npx npm@latest dist-tag add "$PKG@$VER" latest
          else
            npx npm@latest publish --access public --provenance
          fi

  publish-extension:
    name: Publish VS Code Extension
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm install

      - name: Build extension
        working-directory: editors/vscode
        run: npm run compile

      - name: Install publishing tools
        run: npm install -g ovsx @vscode/vsce

      # VS Code Marketplace rejects semver prerelease suffixes like
      # `-alpha.N`; versions must be integer-only M.N.P. We map Floe's
      # tag to an odd-even-minor VSCode version (Microsoft's recommended
      # pre-release convention):
      #   Floe M.N.P-pre.K  →  VSCode M.(2N+1).K   (published --pre-release)
      #   Floe M.N.P stable →  VSCode M.(2N+2).P   (published as stable)
      # This is monotonic forever, matches how rust-analyzer/deno handle
      # the same conflict, and applies to both Open VSX and the Marketplace
      # so a user can install the same extension version from either.
      - name: Compute VSCode extension version
        id: vscode_version
        run: |
          TAG="${{ inputs.tag_name }}"
          VER="${TAG#v}"
          if [[ "$VER" == *-* ]]; then
            BASE="${VER%%-*}"
            PRE="${VER#*-}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            COUNTER="${PRE##*.}"
            VSCODE_VER="${MAJOR}.$((MINOR * 2 + 1)).${COUNTER}"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VER"
            VSCODE_VER="${MAJOR}.$((MINOR * 2 + 2)).${PATCH}"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VSCODE_VER" >> "$GITHUB_OUTPUT"
          echo "Derived VSCode version: $VSCODE_VER (prerelease=${{ inputs.tag_name }} → $VSCODE_VER)"

      - name: Rewrite package.json to VSCode version
        working-directory: editors/vscode
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json'));
            p.version = '${{ steps.vscode_version.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Publish to Open VSX
        working-directory: editors/vscode
        run: |
          if [[ "${{ steps.vscode_version.outputs.is_prerelease }}" == "true" ]]; then
            ovsx publish --pre-release -p ${{ secrets.OVSX_TOKEN }}
          else
            ovsx publish -p ${{ secrets.OVSX_TOKEN }}
          fi

      - name: Publish to VS Code Marketplace
        working-directory: editors/vscode
        run: |
          if [[ "${{ steps.vscode_version.outputs.is_prerelease }}" == "true" ]]; then
            vsce publish --pre-release -p ${{ secrets.VSCE_PAT }}
          else
            vsce publish -p ${{ secrets.VSCE_PAT }}
          fi

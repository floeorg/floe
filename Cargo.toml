[workspace]
members = [".", "crates/floe-wasm"]
resolver = "3"

[package]
name = "floe"
version = "0.3.0"
edition = "2024"
description = "A programming language that compiles to TypeScript + React"
license = "MIT"
repository = "https://github.com/floeorg/floe"
homepage = "https://github.com/floeorg/floe"
keywords = ["compiler", "typescript", "react", "programming-language"]
categories = ["compilers", "development-tools"]
readme = "README.md"

[lib]
name = "floe"
path = "src/lib.rs"

[[bin]]
name = "floe"
path = "src/main.rs"

[features]
default = ["cli"]
cli = ["dep:anyhow", "dep:clap", "dep:notify", "dep:tokio", "dep:tower-lsp", "dep:tempfile"]

[dependencies]
anyhow = { version = "1", optional = true }
ariadne = "0.6"
clap = { version = "4", features = ["derive"], optional = true }
notify = { version = "8", optional = true }
oxc_allocator = "0.123.0"
oxc_ast = "0.123.0"
oxc_parser = "0.123.0"
oxc_span = "0.123.0"
rowan = "0.16"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tempfile = { version = "3.27.0", optional = true }
tokio = { version = "1.50.0", features = ["full"], optional = true }
tower-lsp = { version = "0.20.0", optional = true }

[lints.clippy]
# ── Deny: these break CI immediately ──
collapsible_if = "deny"
collapsible_else_if = "deny"
needless_bool = "deny"
needless_return = "deny"
redundant_else = "deny"
manual_let_else = "deny"
unnested_or_patterns = "deny"
single_match_else = "deny"
fn_params_excessive_bools = "deny"
struct_excessive_bools = "deny"

# ── Complexity ──
cognitive_complexity = "deny"
too_many_lines = "deny"
match_same_arms = "deny"

# ── Code quality (pedantic) ──
redundant_closure = "deny"
needless_pass_by_value = "deny"
wildcard_imports = "deny"
manual_string_new = "deny"
uninlined_format_args = "deny"
needless_continue = "deny"
cast_lossless = "deny"
explicit_iter_loop = "deny"
unused_self = "deny"
unnecessary_wraps = "deny"
match_wildcard_for_single_variants = "deny"

[dev-dependencies]
insta = "1.47.2"

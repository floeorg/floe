# Local target directory (was previously hardcoded to another user's path).
# macOS linker overrides removed since they required `brew install llvm` for lld;
# Linux builds (CI) still use mold for speed.

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]
